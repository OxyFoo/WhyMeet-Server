<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{title}}</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                background: #f8f9fa;
                color: #1a1a1a;
            }
            .card {
                text-align: center;
                padding: 48px 32px;
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
                max-width: 400px;
            }
            .icon {
                font-size: 48px;
                margin-bottom: 16px;
            }
            h1 {
                font-size: 22px;
                margin: 0 0 12px;
            }
            p {
                color: #666;
                margin: 0;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="icon">{{icon}}</div>
            <h1>{{title}}</h1>
            <p>{{message}}</p>
        </div>
    </body>
</html>

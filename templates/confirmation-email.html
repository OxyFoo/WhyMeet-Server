<html lang="en">

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body
        style="font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; color: #1a1a1a"
    >
        <h2 style="color: #6366f1">WhyMeet</h2>
        <p>Click the button below to confirm your device:</p>
        <a
            href="{{link}}"
            style="
                display: inline-block;
                padding: 12px 28px;
                background: #6366f1;
                color: #fff;
                text-decoration: none;
                border-radius: 8px;
                font-weight: 600;
            "
        >
            Confirm my device

        <p style="margin-top: 24px; font-size: 13px; color: #888">

        </p>
    </body>

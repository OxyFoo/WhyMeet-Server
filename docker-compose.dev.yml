services:
    whymeet-db-dev:
        image: postgres:16-alpine
        container_name: whymeet-db-dev
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: whymeet
            POSTGRES_PASSWORD: whymeet
            POSTGRES_DB: whymeet
        volumes:
            - whymeet-db-dev-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U whymeet']
            interval: 2s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    whymeet-server-dev:
        image: node:22-alpine
        container_name: whymeet-server-dev
        user: '1000:1000'
        working_dir: /app
        command: ['sh', '-c', 'npx prisma db push && npm start']
        ports:
            - '0.0.0.0:4600:4600'
        environment:
            NODE_ENV: development
            DATABASE_URL: postgresql://whymeet:whymeet@whymeet-db-dev:5432/whymeet?schema=public
        depends_on:
            whymeet-db-dev:
                condition: service_healthy
        volumes:
            - .:/app:z
        restart: unless-stopped

    whymeet-pgadmin-dev:
        image: dpage/pgadmin4:latest
        container_name: whymeet-pgadmin-dev
        ports:
            - '5050:80'
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@whymeet.dev
            PGADMIN_DEFAULT_PASSWORD: admin
            PGADMIN_CONFIG_SERVER_MODE: 'False'
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
        volumes:
            - whymeet-pgadmin-dev-data:/var/lib/pgadmin
        depends_on:
            - whymeet-db-dev
        restart: unless-stopped

volumes:
    whymeet-db-dev-data:
    whymeet-pgadmin-dev-data:

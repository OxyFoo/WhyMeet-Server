## Compose de production destiné à Dokploy.

services:
  whymeet-db-prod:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
    networks:
      - oxyfoo-network
    volumes:
      - whymeet-db-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME} -d ${POSTGRESQL_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  whymeet-pgbouncer-prod:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DB_HOST: whymeet-db-prod
      DB_PORT: "5432"
      DB_USER: ${POSTGRESQL_USERNAME}
      DB_PASSWORD: ${POSTGRESQL_PASSWORD}
      DB_NAME: ${POSTGRESQL_DATABASE}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MAX_CLIENT_CONN: "300"
      AUTH_TYPE: scram-sha-256
    networks:
      - oxyfoo-network
    depends_on:
      whymeet-db-prod:
        condition: service_healthy
    restart: unless-stopped

  whymeet-redis-prod:
    image: redis:7-alpine
    command: redis-server --save '' --appendonly no --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - oxyfoo-network
    restart: unless-stopped

  # One-shot : applique les migrations Prisma + seed de référence avant le serveur.
  whymeet-server-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run db:deploy
    env_file: .env
    environment:
      # Connexion directe à Postgres (Prisma migrate n'aime pas pgbouncer en pooling)
      DATABASE_URL: postgresql://${POSTGRESQL_USERNAME}:${POSTGRESQL_PASSWORD}@whymeet-db-prod:5432/${POSTGRESQL_DATABASE}?schema=public
    networks:
      - oxyfoo-network
    depends_on:
      whymeet-db-prod:
        condition: service_healthy
    restart: "no"

  # [TEMPORAIRE - MVP] MinIO self-hosted. À remplacer par S3/B2/R2 avant prod sérieuse.
  whymeet-minio-prod:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    networks:
      - oxyfoo-network
      - dokploy-network
    volumes:
      - whymeet-minio-prod-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.whymeet-minio.rule=Host(`${MINIO_PUBLIC_HOST}`)
      - traefik.http.routers.whymeet-minio.entrypoints=websecure
      - traefik.http.routers.whymeet-minio.tls.certresolver=letsencrypt
      - traefik.http.services.whymeet-minio.loadbalancer.server.port=9000

  whymeet-server-prod:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      # Override pour utiliser les hostnames internes du compose
      DATABASE_URL: postgresql://${POSTGRESQL_USERNAME}:${POSTGRESQL_PASSWORD}@whymeet-pgbouncer-prod:5432/${POSTGRESQL_DATABASE}?schema=public
      REDIS_URL: redis://whymeet-redis-prod:6379
    networks:
      - oxyfoo-network
      - dokploy-network
    user: node
    depends_on:
      whymeet-db-prod:
        condition: service_started
      whymeet-pgbouncer-prod:
        condition: service_started
      whymeet-redis-prod:
        condition: service_started
      whymeet-minio-prod:
        condition: service_healthy
      whymeet-server-migrate:
        condition: service_completed_successfully
    volumes:
      - whymeet-server-logs:/app/logs
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.whymeet-server.rule=Host(`${SERVER_PUBLIC_HOST}`)
      - traefik.http.routers.whymeet-server.entrypoints=websecure
      - traefik.http.routers.whymeet-server.tls.certresolver=letsencrypt
      - traefik.http.services.whymeet-server.loadbalancer.server.port=7600

volumes:
  whymeet-db-prod-data:
  whymeet-minio-prod-data:
  whymeet-server-logs:

networks:
  # Réseau partagé inter-stacks (créer une fois dans Dokploy : Docker > Networks).
  oxyfoo-network:
    external: true
  # Réseau Traefik fourni par Dokploy.
  dokploy-network:
    external: true

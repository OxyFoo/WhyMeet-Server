services:
  whymeet-db-prod:
    image: postgres:17-alpine
    container_name: whymeet-db-prod
    environment:
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
    networks:
      oxyfoo-network:
        ipv4_address: 172.16.0.14
    volumes:
      - whymeet-db-prod-data:/var/lib/postgresql/data
    restart: unless-stopped

  whymeet-pgbouncer-prod:
    image: edoburu/pgbouncer:latest
    container_name: whymeet-pgbouncer-prod
    environment:
      DB_HOST: whymeet-db-prod
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRESQL_USERNAME}
      DB_PASSWORD: ${POSTGRESQL_PASSWORD}
      DB_NAME: ${POSTGRESQL_DATABASE}
      POOL_MODE: session
      DEFAULT_POOL_SIZE: "20"
      MAX_CLIENT_CONN: "300"
      AUTH_TYPE: scram-sha-256
    networks:
      oxyfoo-network:
        ipv4_address: 172.16.0.11
    depends_on:
      - whymeet-db-prod
    restart: unless-stopped

  whymeet-redis-prod:
    image: redis:7-alpine
    container_name: whymeet-redis-prod
    command: redis-server --save '' --appendonly no --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      oxyfoo-network:
        ipv4_address: 172.16.0.12
    restart: unless-stopped

  # [TEMPORAIRE - MVP] MinIO en self-hosted pour tester le stockage objet en conditions réelles
  # À remplacer par S3/Backblaze B2/Cloudflare R2 avant une mise en prod sérieuse
  whymeet-minio-prod:
    image: minio/minio:latest
    container_name: whymeet-minio-prod
    ports:
      - "0.0.0.0:9000:9000" # S3 API (accès public pour les uploads clients)
      # 9001 (console admin) non exposé en prod — accès via tunnel SSH si besoin
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    networks:
      oxyfoo-network:
        ipv4_address: 172.16.0.13
    volumes:
      - whymeet-minio-prod-data:/data
    restart: unless-stopped

  whymeet-server-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oxyfoo-whymeet-server-prod
    ports:
      - "0.0.0.0:7600:7600"
    env_file: .env.prod
    environment:
      NODE_ENV: production
      # These override .env.prod to use container hostnames defined in this compose:
      DATABASE_URL: postgresql://${POSTGRESQL_USERNAME}:${POSTGRESQL_PASSWORD}@whymeet-pgbouncer-prod:5432/${POSTGRESQL_DATABASE}?schema=public
      REDIS_URL: redis://whymeet-redis-prod:6379
    networks:
      oxyfoo-network:
        ipv4_address: 172.16.0.10
      network-server-web:
        ipv4_address: 170.16.0.40
    user: node
    depends_on:
      - whymeet-db-prod
      - whymeet-pgbouncer-prod
      - whymeet-redis-prod
      - whymeet-minio-prod
    volumes:
      - ./logs:/app/logs
      - /etc/ssl/whymeet-certs/fullchain.pem:/etc/letsencrypt/live/whymeet/fullchain.pem:ro
      - /etc/ssl/whymeet-certs/privkey.pem:/etc/letsencrypt/live/whymeet/privkey.pem:ro
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
    restart: unless-stopped

volumes:
  whymeet-db-prod-data:
  whymeet-minio-prod-data:

networks:
  oxyfoo-network:
    external: true
  network-server-web:
    external: true
